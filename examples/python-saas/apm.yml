name: my-langgraph-saas
version: 0.0.1
description: >
  LangGraph news digest SaaS — Python agents with cloud deployment.
  Composes flavour packages by concern.

dependencies:
  apm:
    - thinkjones/awesome-everything/apm-core              # Engineering fundamentals (every project)
    - thinkjones/awesome-everything/apm-python            # Python dev + FastMCP
    - thinkjones/awesome-everything/apm-agents            # Agent swarms, MCP builder, LangSmith
    - thinkjones/awesome-everything/apm-dataops           # PostgreSQL, data pipelines
    - thinkjones/awesome-everything/apm-devops            # Docker, CI/CD, Terraform
    - thinkjones/awesome-everything/apm-cloud             # Azure/AWS IaC, serverless
    - thinkjones/awesome-everything/apm-planning          # PRD, requirements, task breakdown
