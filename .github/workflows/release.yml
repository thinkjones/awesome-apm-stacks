name: Release APM Packages

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate YAML syntax in all package manifests
        run: |
          set -euo pipefail
          errors=0
          for dir in */; do
            pkg="${dir%/}"
            case "$pkg" in
              examples|wrappers|scripts|docs|site|apm_modules|.github|.claude) continue ;;
            esac
            manifest="${pkg}/apm.yml"
            [ -f "$manifest" ] || continue

            if ! python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" "$manifest" 2>/dev/null; then
              echo "::error::Invalid YAML in ${manifest}"
              errors=$((errors + 1))
            else
              echo "  ${pkg}: valid YAML"
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "::error::${errors} validation error(s) found"
            exit 1
          fi
          echo "All package manifests validated."

      - name: Detect packages with version increases
        id: changes
        env:
          PREV_COMMIT_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          PREV_SHA="$PREV_COMMIT_SHA"
          if [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ]; then
            PREV_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          cmp_semver() {
            python3 -c 'import sys; p=lambda v: tuple(int(x) for x in v.split(".")); sys.exit(0 if p(sys.argv[2]) > p(sys.argv[1]) else 1)' "$1" "$2"
          }

          releases=""
          for dir in */; do
            pkg="${dir%/}"
            case "$pkg" in
              examples|wrappers|scripts|docs|site|apm_modules|.github|.claude) continue ;;
            esac
            manifest="${pkg}/apm.yml"
            [ -f "$manifest" ] || continue

            head_version="$(awk '/^version:/ {print $2; exit}' "$manifest")"
            prev_manifest="$(git show "${PREV_SHA}:${manifest}" 2>/dev/null || true)"

            if [ -z "$prev_manifest" ]; then
              # New package in this push — release at head version
              releases="${releases} ${pkg}:${head_version}"
              echo "  ${pkg}: new package -> v${head_version}"
              continue
            fi

            prev_version="$(printf '%s\n' "$prev_manifest" | awk '/^version:/ {print $2; exit}')"

            if [ "$prev_version" = "$head_version" ]; then
              continue
            fi

            if cmp_semver "$prev_version" "$head_version"; then
              releases="${releases} ${pkg}:${head_version}"
              echo "  ${pkg}: ${prev_version} -> ${head_version}"
            else
              echo "::warning::${pkg}: version changed ${prev_version} -> ${head_version} is not a strict increase; skipping release"
            fi
          done

          echo "releases=${releases# }" >> "$GITHUB_OUTPUT"
          if [ -z "$releases" ]; then
            echo "No version increases detected."
          fi

      - name: Create tags and GitHub Releases
        if: steps.changes.outputs.releases != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASES: ${{ steps.changes.outputs.releases }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for entry in $RELEASES; do
            pkg="${entry%%:*}"
            version="${entry#*:}"
            tag="${pkg}/v${version}"

            if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "  ${tag}: tag already exists, skipping"
              continue
            fi

            git tag "$tag"
            git push origin "refs/tags/${tag}"

            gh release create "$tag" \
              --title "${pkg} v${version}" \
              --notes "Automated release for \`${pkg}\` package.

          Install:
          \`\`\`
          apm install thinkjones/awesome-apm-stacks?path=${pkg}#${tag}
          \`\`\`" \
              --latest=false

            echo "  ${tag}: tagged and released"
          done
