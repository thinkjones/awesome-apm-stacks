name: Test APM Packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      packages:
        description: 'Space-separated package names to test (empty = all)'
        required: false
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-changes:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.diff.outputs.packages }}
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed package directories
        id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PREV_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            PREV_SHA="$PUSH_BEFORE"
            HEAD_SHA="HEAD"
            if [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ]; then
              PREV_SHA=$(git rev-list --max-parents=0 HEAD)
            fi
          fi

          changed_packages=""
          for dir in */; do
            dirname="$(basename "$dir")"
            case "$dirname" in
              examples|wrappers|scripts|docs|site|apm_modules|.git|.github|.claude) continue ;;
            esac
            if [ -f "$dir/apm.yml" ] && git diff --name-only "$PREV_SHA" "$HEAD_SHA" | grep -q "^${dirname}/"; then
              changed_packages="$changed_packages $dirname"
            fi
          done

          changed_packages="$(echo "$changed_packages" | xargs)"
          echo "packages=$changed_packages" >> "$GITHUB_OUTPUT"

          if [ -n "$changed_packages" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed packages: $changed_packages"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No package directories changed"
          fi

  should-run-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tests should run
        id: check
        run: |
          RECENT_COMMITS=$(git log --oneline --since="24 hours ago" | wc -l | xargs)
          DAY_OF_WEEK=$(date -u +%u)

          if [ "$RECENT_COMMITS" -gt 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Found $RECENT_COMMITS recent commits — running tests"
          elif [ "$DAY_OF_WEEK" -eq 1 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Weekly Monday run — running tests"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "No recent commits and not Monday — skipping"
          fi

  test:
    needs: [detect-changes, should-run-scheduled]
    if: |
      always() && (
        ((github.event_name == 'push' || github.event_name == 'pull_request') && needs.detect-changes.outputs.has_changes == 'true') ||
        (github.event_name == 'schedule' && needs.should-run-scheduled.outputs.should_run == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Install APM CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # We can't use the official installer (aka.ms/apm-unix): it fetches
          # release metadata from the unauthenticated GitHub API, which hits
          # the shared-IP rate limit on GitHub-hosted runners. Its
          # fallback-to-auth branch only triggers on "Not Found" responses,
          # not "API rate limit exceeded", so rate-limited runs fail hard.
          # Download the release asset directly via gh (authenticated via
          # GH_TOKEN) and install manually.
          #
          # The tarball structure is:
          #   apm-linux-x86_64/apm            (main binary)
          #   apm-linux-x86_64/_internal/...  (runtime deps — must stay next
          #                                    to the binary)
          # We strip the top-level dir so the binary and _internal/ land in
          # the install dir together. We deliberately avoid $HOME/.apm
          # because APM itself caches user-scope packages there.
          tmp="$(mktemp -d)"
          install_dir="$HOME/apm-cli"
          gh release download --repo microsoft/apm \
            --pattern '*linux*x86_64*.tar.gz' \
            --dir "$tmp"
          mkdir -p "$install_dir"
          tar -xzf "$tmp"/*linux*x86_64*.tar.gz --strip-components=1 -C "$install_dir"
          chmod +x "$install_dir/apm"
          echo "$install_dir" >> "$GITHUB_PATH"
          export PATH="$install_dir:$PATH"
          apm --version

      - name: Determine packages to test
        id: packages
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_PACKAGES: ${{ needs.detect-changes.outputs.packages }}
          INPUT_PACKAGES: ${{ github.event.inputs.packages }}
        run: |
          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "pull_request" ]; then
            echo "args=$CHANGED_PACKAGES" >> "$GITHUB_OUTPUT"
            echo "Testing changed packages: $CHANGED_PACKAGES"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_PACKAGES" ]; then
            echo "args=$INPUT_PACKAGES" >> "$GITHUB_OUTPUT"
            echo "Testing requested packages: $INPUT_PACKAGES"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "Testing all packages"
          fi

      - name: Run package tests
        env:
          TEST_PACKAGES: ${{ steps.packages.outputs.args }}
        run: |
          if [ -n "$TEST_PACKAGES" ]; then
            ./scripts/test-packages.sh --ci $TEST_PACKAGES
          else
            ./scripts/test-packages.sh --ci
          fi
