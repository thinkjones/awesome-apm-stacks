name: my-fullstack-saas
version: 0.0.1
description: >
  Fullstack SaaS — Go API + React frontend + ML features.
  Composes flavour packages by concern.

dependencies:
  apm:
    - thinkjones/awesome-everything/apm-core              # Engineering fundamentals (every project)
    - thinkjones/awesome-everything/apm-go                # Go API development
    - thinkjones/awesome-everything/apm-typescript        # React/TS frontend
    - thinkjones/awesome-everything/apm-design            # UI/UX, theming, accessible design
    - thinkjones/awesome-everything/apm-mlops             # Model observability, eval pipelines
    - thinkjones/awesome-everything/apm-dataops           # PostgreSQL, data modelling
    - thinkjones/awesome-everything/apm-devops            # Docker, CI/CD, Terraform
    - thinkjones/awesome-everything/apm-cloud             # Cloud architecture, IaC
    - thinkjones/awesome-everything/apm-planning          # PRD, requirements, QA
    - thinkjones/awesome-everything/apm-docs              # Deliverables, reports, decks
