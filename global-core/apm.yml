name: global-core
version: 1.0.0
description: >
  Universal skills, agents, and hooks for every project — TDD workflow,
  context engineering, prompt craft, research, debugging, and runtime safety.

dependencies:
  apm:
    # An agentic skills framework & software development methodology that works
    - obra/superpowers

    # A powerful MCP toolkit for coding, providing semantic retrieval and editing capabilities - the IDE for your agent
    - oraios/serena

    # A comprehensive list of plugins
    - anthropics/claude-plugins-official
    
    # Matt Pocock personal directory of skills, straight from my .claude directory.
    - thinkjones/awesome-everything/wrappers/github.com/mattpocock/skills

    # ── Context engineering — structured context for better outputs ──
    - github/awesome-copilot/plugins/context-engineering

    # ── Hallucination verification pipeline ──
    - github/awesome-copilot/plugins/doublecheck

    # ── Challenge assumptions before committing ──
    - github/awesome-copilot/agents/devils-advocate.agent.md

    # ── Public repository for Agent Skills
    - anthropics/skills

    # TDD Guard: blocks file changes that violate TDD principles
    - nizos/tdd-guard
